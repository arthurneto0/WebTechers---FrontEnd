<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>profile-card</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<template id="profile">
    <style>
        .card {
            
            background-color: rgb(255, 235, 143);
            display: flex;
            flex-direction: column;
            width: 325px;
            border-radius: 30px;
            align-items: center;
            gap: 7px;
            padding: 10px;
        }
        img{
            width: 300px;
            height: 300px;
            border-radius: 50%;
        }
        .name {
            font-weight: bold;
            font-size: 25px;
        }

        .bio {
            font-size: 16px;
        }
        
    </style>
    <span class="card">
        <span class="icon">
            <img src="img/default.jpg" alt="Ícone padrão de perfil">
        </span>
        <span class="name">
            <slot name="nome">O nome</slot>
        </span>
        <span class="bio">
            <slot name="biografia">A biografia</slot>
        </span>
    </span>
</template>
<body>
    <profile-card img="img/pessoa.jpg">
        <span slot="nome">Fulaninho</span>
    </profile-card>
    <profile-card >
        <span slot="nome">Beltrano</span>
        <span slot="biografia">slaaaa</span>
    </profile-card>
</body>
</html>
